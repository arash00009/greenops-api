apiVersion: apps/v1
kind: Deployment
metadata:
  name: greenops-frontend
  namespace: greenops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: greenops-frontend
  template:
    metadata:
      labels:
        app: greenops-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/arash00009/greenops-frontend:main
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-conf
          configMap:
            name: greenops-frontend-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: greenops-frontend
  namespace: greenops
spec:
  selector:
    app: greenops-frontend
  ports:
    - name: http
      port: 8081
      targetPort: 80

